<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodDonation API | Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF7D45;
            --secondary: #22C55E;
            --dark: #1F2937;
            --light: #F9FAFB;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 90%;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            background: #D1FAE5;
            color: #065F46;
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 0.825rem;
            margin-bottom: 2rem;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background: #22C55E;
            border-radius: 50%;
            margin-right: 0.5rem;
            animation: pulse 2s infinite;
        }
        h1 {
            color: var(--primary);
            margin-bottom: 1rem;
            font-size: 2rem;
        }
        p {
            color: #6B7280;
            line-height: 1.6;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }
        .card {
            background: #F3F4F6;
            padding: 1rem;
            border-radius: 1rem;
            font-size: 0.825rem;
        }
        .card strong {
            display: block;
            color: var(--dark);
            margin-bottom: 0.25rem;
        }
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">
            <div class="status-dot"></div>
            SYSTEM OPERATIONAL
        </div>
        <h1>FoodDonation API</h1>
        <p>The backend environment is live and specifically optimized for your Flutter application.</p>
        
        <div class="grid">
            <div class="card">
                <strong>Real-time</strong>
                WebSocket Ready
            </div>
            <div class="card">
                <strong>Database</strong>
                MongoDB Atlas
            </div>
            <div class="card">
                <strong>Auth</strong>
                JWT / Google
            </div>
            <div class="card">
                <strong>Storage</strong>
                Cloudinary CDN
            </div>
        </div>
        
        <p style="margin-top: 2rem; font-size: 0.75rem;">Connected to Render.com Cloud Platform</p>
    </div>
</body>
</html>
